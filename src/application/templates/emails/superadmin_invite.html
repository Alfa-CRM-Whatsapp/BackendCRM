<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body style="background:#f4f6f8;padding:40px;font-family:Arial">

<div style="
max-width:600px;
margin:auto;
background:white;
border-radius:10px;
padding:40px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
">

<h2 style="color:#0f172a;">
Novo SuperAdmin precisa de aprovação
</h2>

<p style="color:#475569;">
Um novo usuário solicitou acesso como <b>SuperAdmin</b>.
</p>

<div style="
background:#f1f5f9;
padding:15px;
border-radius:6px;
margin:20px 0;
">

<strong>Email:</strong> {{ email }}

</div>

<div style="text-align:center;margin-top:30px">

<a href="{{ approve_link }}"
style="
background:#f97316;
color:white;
padding:14px 26px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
display:inline-block;
">
Aprovar SuperAdmin
</a>

</div>

<p style="margin-top:30px;color:#94a3b8;font-size:14px">
Se você não solicitou essa ação, ignore este email.
</p>

</div>

</body>
</html>
