<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body style="background:#f4f6f8;padding:40px;font-family:Arial">

<div style="
max-width:600px;
margin:auto;
background:white;
border-radius:10px;
padding:40px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
">

<h2 style="color:#0f172a;">
Novo SuperAdmin precisa de aprovação
</h2>

<p style="color:#475569;">
Um novo usuário solicitou acesso como <b>SuperAdmin</b>.
</p>

<div style="
background:#f1f5f9;
padding:15px;
border-radius:6px;
margin:20px 0;
">

<p style="margin:5px 0;">
<strong>Email:</strong> {{ email }}
</p>

<p style="margin:5px 0;">
<strong>Token de aprovação:</strong>
</p>

<div style="
background:#e2e8f0;
padding:12px;
border-radius:6px;
font-family:monospace;
font-size:14px;
word-break:break-all;
margin-top:5px;
">
{{ token }}
</div>

</div>

<p style="margin-top:30px;color:#94a3b8;font-size:14px">
Se você não reconhece essa solicitação, ignore este email.
</p>

</div>

</body>
</html>
